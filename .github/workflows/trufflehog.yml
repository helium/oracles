name: TruffleHog Secret Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Need full history for TruffleHog

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@v3.92.5
        with:
          path: ./
          extra_args: --debug --results verified
