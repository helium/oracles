# Trino catalog for the Solana on-chain indexer database.
#
# mobile-verifier recovers each epoch's HNT reward price from on-chain HIP-149
# backstop data read through this catalog:
#   solana.public.dao_epoch_infos     (deployer_cap_hnt)
#   solana.public.sub_dao_epoch_infos (dc_burned, per sub-DAO)
#
# In a real deployment `connection-url` must point at the Solana on-chain
# indexer Postgres (the same database mobile-config uses for its on-chain
# metadata pool). The local value below just reuses the dev postgres so the
# catalog is valid; those tables won't exist locally.
connector.name=postgresql
connection-url=jdbc:postgresql://postgres:5432/postgres
connection-user=postgres
connection-password=postgres
