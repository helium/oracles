# RUST_LOG compatible settings string. Default below
#
# log = "price=info,file_store=info"

# Hermes price update URL including the HNT feed id query parameter. Default
# below.
#
# source = "https://hermes.pyth.network/v2/updates/price/latest?ids[]=649fdd7ec08e8e2a20f425729854e90293dcbe2376abc47197a14da6ff339756"

# S3 bucket to write price reports to. Required.
output_bucket = "price"

# Folder for the local on-disk price cache / file sink staging area.
# Default below.
#
# cache = "/opt/price/data"

# Price tick interval. Default = 60s. Optional.
interval = "60 seconds"

# How long to keep using the last successfully-fetched price after Hermes
# fetches start failing. Default = 12 hours. Optional.
#
# stale_price_duration = "12 hours"

# Static HNT price override (8-decimal integer, e.g. $1 = 100000000). When set,
# the service emits this value every tick instead of calling the Hermes API.
# Intended for testing. Optional.
#
# default_price =


[custom_tracing]
# File watched for runtime tracing-config reloads. Default below.
#
# tracing_cfg_file = "tracing.cfg"


[file_store]
# AWS region for the output bucket. Inferred from the AWS config / IAM context
# by default.
#
# region = "us-west-2"

# Optional AWS S3 endpoint override. Defaults to the standard AWS endpoint.
#
# endpoint = "https://aws-s3-bucket.aws.com"

# Static AWS credentials. Only for local testing — prefer IAM in production.
#
# access_key_id = "..."
# secret_access_key = "..."


[metrics]
# Prometheus scrape endpoint. Default below.
#
# endpoint = "127.0.0.1:19000"
