# log settings for the application (RUST_LOG format). Default below
#
# log = "price=debug"

# Hermes price update URL including the HNT feed id query parameter. Required.
source = "https://hermes.pyth.network/v2/updates/price/latest?ids[]=649fdd7ec08e8e2a20f425729854e90293dcbe2376abc47197a14da6ff339756"

# Price tick interval (secs). Default = 60s. Optional.
interval = "60 seconds"

# Static HNT price override (8-decimal integer, e.g. $1 = 100000000). When set,
# the service emits this value every tick instead of calling the Hermes API.
# Intended for testing. Optional.
# default_price =

# Cache folder to use. Default below
#
# cache = "/var/data/price"

[output]
# Output bucket for price

# Name of bucket to write details to. Required
#
bucket = "price"

# Region for bucket. Defaults to below
#
# region = "us-west-2"

# Optional URL for AWS api endpoint. Inferred from aws config settings or aws
# IAM context by default
#
# endpoint = "https://aws-s3-bucket.aws.com"


[metrics]

# Endpoint for metrics. Default below
#
# endpoint = "127.0.0.1:19000"
